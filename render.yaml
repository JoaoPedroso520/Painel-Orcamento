services:
  - type: web
    name: painel-orcamento
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: painel-orcamento-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: painel-orcamento-db
    databaseName: painel_orcamento
    user: painel_user
